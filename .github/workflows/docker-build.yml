name: Build & Push Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Required for linux/arm64 cross-compilation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags produced on every merge to main:
      #   ghcr.io/owner/repo:latest
      #   ghcr.io/owner/repo:sha-<short>
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Resolve Keycloak build-args from repository variables with fallbacks.
      # Set these in: Settings → Secrets and variables → Actions → Variables
      - name: Resolve build args
        id: buildargs
        run: |
          echo "keycloak_url=${{ vars.VITE_KEYCLOAK_URL != '' && vars.VITE_KEYCLOAK_URL || 'http://localhost:8080' }}" >> $GITHUB_OUTPUT
          echo "keycloak_realm=${{ vars.VITE_KEYCLOAK_REALM != '' && vars.VITE_KEYCLOAK_REALM || 'game-streamer' }}" >> $GITHUB_OUTPUT
          echo "keycloak_client=${{ vars.VITE_KEYCLOAK_CLIENT_ID != '' && vars.VITE_KEYCLOAK_CLIENT_ID || 'game-streamer-app' }}" >> $GITHUB_OUTPUT
          echo "app_base_url=${{ vars.VITE_APP_BASE_URL != '' && vars.VITE_APP_BASE_URL || 'http://localhost:8000' }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_KEYCLOAK_URL=${{ steps.buildargs.outputs.keycloak_url }}
            VITE_KEYCLOAK_REALM=${{ steps.buildargs.outputs.keycloak_realm }}
            VITE_KEYCLOAK_CLIENT_ID=${{ steps.buildargs.outputs.keycloak_client }}
            VITE_APP_BASE_URL=${{ steps.buildargs.outputs.app_base_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
