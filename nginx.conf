# Rate-limiting zones (in http context — this file is included inside http{} by nginx.conf)
limit_req_zone $binary_remote_addr zone=obs_cmd:10m   rate=30r/m;
limit_req_zone $binary_remote_addr zone=yt_auth:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=120r/m;

server {
    listen 8000;
    server_name _;
    root /app/dist;
    index index.html;

    # Redirect nginx temp dirs to /tmp (Cloudron read-only filesystem)
    client_body_temp_path /tmp/nginx/client_temp;
    proxy_temp_path        /tmp/nginx/proxy_temp;
    fastcgi_temp_path      /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path        /tmp/nginx/uwsgi_temp;
    scgi_temp_path         /tmp/nginx/scgi_temp;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Overlay pages must be embeddable in OBS (remove X-Frame-Options for overlay)
    location ~* ^/overlay/ {
        add_header X-Frame-Options "" always;
        try_files $uri $uri/ /index.html;
    }

    # YouTube OAuth callback — strict rate limit (10/min per IP)
    location = /api/youtube/callback {
        limit_req zone=yt_auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        add_header Cache-Control "no-store";
    }

    # OBS streaming command — moderate rate limit (30/min per IP)
    location = /api/obs/command {
        limit_req zone=obs_cmd burst=10 nodelay;
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        add_header Cache-Control "no-store";
    }

    # All other API endpoints — general rate limit
    location ~ ^/api/(game-settings|youtube|matches|obs) {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        add_header Cache-Control "no-store";
    }

    # Proxy WBSC live game data — avoids browser CORS restrictions.
    # CORS is restricted to the app's own origin (same-origin SPA requests only).
    location /gamedata/ {
        resolver 1.1.1.1 8.8.8.8 valid=30s;
        proxy_pass https://game.wbsc.org/gamedata/;
        proxy_ssl_server_name on;
        proxy_set_header Host game.wbsc.org;
        proxy_set_header Accept "application/json";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$scheme://$host" always;
        add_header Vary "Origin" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Runtime config — generated by start.sh from Cloudron env vars
    location = /config.js {
        alias /tmp/config.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
