<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark app-icon background -->
  <rect width="100" height="100" rx="22" fill="#1a1f2e"/>
  <!-- Baseball body -->
  <circle cx="50" cy="50" r="34" fill="#f5f0e8" stroke="#ddd4c0" stroke-width="1.5"/>
  <!-- Left seam curve -->
  <path d="M38 19 C24 30 24 70 38 81" fill="none" stroke="#d43b3b" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right seam curve -->
  <path d="M62 19 C76 30 76 70 62 81" fill="none" stroke="#d43b3b" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left stitches -->
  <g stroke="#d43b3b" stroke-width="1.8" stroke-linecap="round">
    <line x1="38" y1="27" x2="44" y2="30"/>
    <line x1="37" y1="35" x2="43" y2="35"/>
    <line x1="37" y1="43" x2="43" y2="41"/>
    <line x1="37" y1="50" x2="43" y2="50"/>
    <line x1="37" y1="57" x2="43" y2="59"/>
    <line x1="37" y1="65" x2="43" y2="65"/>
    <line x1="38" y1="73" x2="44" y2="70"/>
  </g>
  <!-- Right stitches -->
  <g stroke="#d43b3b" stroke-width="1.8" stroke-linecap="round">
    <line x1="62" y1="27" x2="56" y2="30"/>
    <line x1="63" y1="35" x2="57" y2="35"/>
    <line x1="63" y1="43" x2="57" y2="41"/>
    <line x1="63" y1="50" x2="57" y2="50"/>
    <line x1="63" y1="57" x2="57" y2="59"/>
    <line x1="63" y1="65" x2="57" y2="65"/>
    <line x1="62" y1="73" x2="56" y2="70"/>
  </g>
</svg>
